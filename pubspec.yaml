name: crop_doctor
description: AI-Powered Crop Disease Prediction for Farmers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  http: ^1.1.0
  provider: ^6.0.5
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path: ^1.8.3
  flutter_tts: ^3.8.5
  fl_chart: ^0.66.0
  google_maps_flutter: ^2.5.0
  intl: ^0.18.1
  connectivity_plus: ^5.0.1
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/fonts/
