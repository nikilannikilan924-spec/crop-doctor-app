name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: app_source

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'

      - name: Generate platform files
        run: |
          flutter create --project-name crop_doctor --org com.cropdoctor crop_doctor_build
          rm -rf crop_doctor_build/lib
          cp -r app_source/lib crop_doctor_build/lib
          cp app_source/pubspec.yaml crop_doctor_build/pubspec.yaml
          cp -r app_source/assets crop_doctor_build/assets
          cp app_source/analysis_options.yaml crop_doctor_build/analysis_options.yaml
          sed -i 's/compileSdkVersion 33/compileSdkVersion 34/' crop_doctor_build/android/app/build.gradle

      - name: Get dependencies
        run: flutter pub get
        working-directory: crop_doctor_build

      - name: Build APK
        run: flutter build apk --split-per-abi --release
        working-directory: crop_doctor_build

      - uses: actions/upload-artifact@v4
        with:
          name: crop-doctor-apk
          path: crop_doctor_build/build/app/outputs/flutter-apk/*.apk
